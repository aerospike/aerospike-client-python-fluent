# SKELETON — not yet wired into the live release pipeline.
#
# Implements Gate 2 (DEV → STAGE, owner: QE) of the new release pipeline.
#
# Promotion model:
#   1. A release manager (admin) manually fast-forwards `stage` to `dev`'s
#      tip from their local machine:
#          git fetch origin
#          git push origin origin/dev:stage      # FF-only push
#   2. That push triggers this workflow on `branch: stage`.
#   3. This workflow promotes the JFrog Release Bundle v2 from the DEV-tier
#      JFrog environment to the STAGE-tier environment via the shared
#      `promote-release-bundle` composite action.
#
# The workflow does NOT perform any git pushes. The branch advancement is
# already done by the human at step 1; this workflow only advances the
# *artifact* state in JFrog to match. Splitting the human action (git) from
# the automated action (artifact promotion) lets us avoid bot PATs and
# ruleset bypass entirely.
#
# Apr 27 update: refactored from raw `jf rbp` to the
# `aerospike/shared-workflows/.github/actions/promote-release-bundle@v3.3.0`
# composite action per DevOps guidance (Albert Lagman). The action takes a
# constant `environment: STAGE` (resolved internally to the actual JFrog
# repos + signing key) so we no longer carry per-env or signing-key vars.
#
# Status: skeleton. Will not promote anything until DevOps provisions
# JFROG_PROJECT (= "database" per Apr 27 DevOps response). When it's unset
# the workflow logs and exits 0 instead of failing every promotion.
#
# See .cursor/plans/release-pipeline.md §0.6.b for full design notes.

name: Promote dev → stage (Gate 2)

on:
  push:
    branches: [stage]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry-run (skip the actual bundle promotion)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  verify-ancestry:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify stage tip is reachable from dev
        run: |
          git fetch origin dev
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/dev; then
            echo "::error::stage tip $GITHUB_SHA is not reachable from origin/dev."
            echo "  dev tip:   $(git rev-parse origin/dev)"
            echo "  stage tip: $GITHUB_SHA"
            echo "Refusing to promote a non-fast-forward stage tip."
            exit 1
          fi
          echo "stage tip $GITHUB_SHA is an ancestor of origin/dev — OK to promote."

  extract-version:
    needs: verify-ancestry
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: extract
        run: |
          VERSION="$(./bin/get-version)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Promoting version: ${VERSION}"

  promote-bundle:
    needs: [verify-ancestry, extract-version]
    runs-on: ubuntu-22.04
    steps:
      - name: Skip if JFrog not provisioned (skeleton phase)
        id: gate
        run: |
          if [[ -z "${{ vars.JFROG_PROJECT }}" ]]; then
            echo "JFROG_PROJECT unset — skeleton phase, skipping promotion."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Harden the runner
        if: steps.gate.outputs.skip != 'true'
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      # The promote-release-bundle composite action expects JFrog CLI to be
      # configured by the caller (per its README). We use OIDC.
      - name: Set up JFrog CLI
        if: steps.gate.outputs.skip != 'true'
        uses: step-security/setup-jfrog-cli@893a92f96c7727242adf0e603c77b1f2a22390e1 # v4.9.1
        env:
          JF_URL: https://artifact.aerospike.io
          JF_PROJECT: ${{ vars.JFROG_PROJECT }}
        with:
          oidc-provider-name: ${{ vars.OIDC_PROVIDER_NAME || 'gh-aerospike' }}
          oidc-audience: ${{ vars.OIDC_AUDIENCE || 'aerospike' }}

      - name: Dry-run summary
        if: ${{ steps.gate.outputs.skip != 'true' && (inputs.dry-run || 'false') == 'true' }}
        env:
          BUNDLE_VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          echo "DRY-RUN: would call promote-release-bundle —"
          echo "  bundle-name: aerospike-client-python-sdk"
          echo "  version:     $BUNDLE_VERSION"
          echo "  environment: STAGE"
          echo "  jf-project:  ${{ vars.JFROG_PROJECT }}"

      - name: Promote Release Bundle v2 (DEV → STAGE)
        if: ${{ steps.gate.outputs.skip != 'true' && (inputs.dry-run || 'false') != 'true' }}
        uses: aerospike/shared-workflows/.github/actions/promote-release-bundle@07c958ca # v3.3.0
        with:
          bundle-name: aerospike-client-python-sdk
          version: ${{ needs.extract-version.outputs.version }}
          environment: STAGE
          jf-project: ${{ vars.JFROG_PROJECT }}
