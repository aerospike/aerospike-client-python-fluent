name: CI Build & Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  PAC_REPO: "aerospike/aerospike-client-python-async"

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Resolve PAC version from pyproject.toml
        run: |
          PAC_VERSION=$(grep 'aerospike-client-python-async' pyproject.toml | grep -oP '@\Kv[^"]+')
          echo "PAC_VERSION=$PAC_VERSION" >> "$GITHUB_ENV"

      - name: Install PAC wheel from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CPVER=$(echo "${{ matrix.python }}" | tr -d '.')
          PATTERN="*cp${CPVER}-cp${CPVER}-manylinux*x86_64*.whl"
          gh release download "$PAC_VERSION" \
            --repo "$PAC_REPO" \
            --pattern "$PATTERN" \
            --dir pac_wheel
          pip install pac_wheel/*.whl

      - name: Install PFC and dev dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install . --no-deps

      - name: Generate ANTLR parser
        run: make generate-dsl

      - name: Run unit tests
        run: python -m pytest tests/unit -v

  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Start Aerospike server
        run: |
          docker run -d -p 3000:3000 --name aerospike-server aerospike/aerospike-server:8.1.0.2
          for i in {1..10}; do
            if docker exec aerospike-server asinfo -v "statistics" > /dev/null 2>&1; then
              echo "Aerospike server is ready after $i seconds"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "Aerospike server failed to start after 10 seconds"
              docker logs aerospike-server
              exit 1
            fi
            echo "Waiting for Aerospike server... ($i/10)"
            sleep 1
          done
          echo "Configuring namespace for TTL support..."
          docker exec aerospike-server asinfo -v "set-config:context=namespace;id=test;nsup-period=120"
          docker exec aerospike-server asinfo -v "set-config:context=namespace;id=test;default-ttl=2592000"
          echo "=== Server Build ==="
          docker exec aerospike-server asinfo -v "build"

      - name: Resolve PAC version from pyproject.toml
        run: |
          PAC_VERSION=$(grep 'aerospike-client-python-async' pyproject.toml | grep -oP '@\Kv[^"]+')
          echo "PAC_VERSION=$PAC_VERSION" >> "$GITHUB_ENV"

      - name: Install PAC wheel from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CPVER=$(echo "${{ matrix.python }}" | tr -d '.')
          PATTERN="*cp${CPVER}-cp${CPVER}-manylinux*x86_64*.whl"
          gh release download "$PAC_VERSION" \
            --repo "$PAC_REPO" \
            --pattern "$PATTERN" \
            --dir pac_wheel
          pip install pac_wheel/*.whl

      - name: Install PFC and dev dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install . --no-deps

      - name: Generate ANTLR parser
        run: make generate-dsl

      - name: Run integration tests
        env:
          AEROSPIKE_HOST: localhost:3000
          AEROSPIKE_USE_SERVICES_ALTERNATE: "true"
          # Docker aerospike-server image is Community; durable-delete needs Enterprise.
          AEROSPIKE_ENTERPRISE: "false"
        run: |
          rm -f aerospike.env
          python -m pytest tests/integration -v || TEST_FAILED=true
          if [ "$TEST_FAILED" = "true" ]; then
            echo "=== Aerospike Server Log (last 100 lines) ==="
            docker logs --tail 100 aerospike-server
            echo "=== End of Server Log ==="
            exit 1
          fi
