    - Error Handling: guide/error-handling.md
    - Background Tasks & UDF: guide/background-udf.md
    - Secondary Indexes: guide/indexes.md
    - Logging: guide/logging.md
  - API Reference:
    - Overview: api/index.md
    - Async:
      - Client: api/client.md
      - Cluster: api/cluster.md
      - Session: api/session.md
      - Query Builders: api/query.md
      - WriteSegmentBuilder: api/write-segment.md
      - CDT Read: api/cdt-read.md
      - CDT Write: api/cdt-write.md
      - Batch Builders: api/batch.md
      - IndexBuilder: api/index-builder.md
      - Background Builders: api/background.md
